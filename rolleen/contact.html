<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact – Rolleen's Arena</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet" />
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'Inter', sans-serif; background:#faf9f6; color:#2c2c2c; line-height:1.6; }
        .container { max-width:1200px; margin:0 auto; padding:0 24px; }
        .btn {
            display:inline-block; padding:14px 36px; background:#c8a76e; color:#fff;
            font-weight:600; border-radius:40px; border:none; cursor:pointer;
            transition:background 0.3s, transform 0.2s;
        }
        .btn:hover { background:#b08f55; transform:translateY(-2px); }

        .navbar {
            position:fixed; top:0; width:100%; background:rgba(255,255,255,0.92);
            backdrop-filter:blur(10px); box-shadow:0 2px 20px rgba(0,0,0,0.06);
            z-index:999; padding:16px 0;
        }
        .navbar .container { display:flex; justify-content:space-between; align-items:center; }
        .logo { font-family:'Playfair Display', serif; font-size:1.8rem; font-weight:700; color:#1e3a2f; }
        .logo span { color:#c8a76e; }
        .nav-links { display:flex; gap:32px; list-style:none; font-weight:500; }
        .nav-links a { transition:color 0.3s; font-size:0.95rem;}
